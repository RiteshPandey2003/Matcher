spring.application.name=Matcher
# Server
server.port=8080

# GitHub Models API Key
# Get your token from: https://github.com/settings/tokens
# Required permission: "Models: Read and Write"
github.api.key=GITHUB_TOKEN

# Logging - shows AI request/response in console
logging.level.dev.langchain4j=DEBUG
logging.level.com.Image.Matcher=DEBUG